name: Lead Follow-up

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger follow-up drip
        run: |
          curl -sf -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://leads.faradaysun.com/api/cron/follow-up" \
            || echo "Request failed but continuing"
