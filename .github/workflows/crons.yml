name: Storm Monitor

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  storm-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger storm check
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/storm_response.json -w "%{http_code}" \
            -X GET "${{ secrets.SITE_URL }}/api/cron/storm-check" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          echo "HTTP status: $HTTP_STATUS"
          cat /tmp/storm_response.json || true
          if [ "$HTTP_STATUS" -ge 500 ]; then
            echo "::warning::Storm check returned $HTTP_STATUS"
          fi
