name: FEMA Monitor

on:
  schedule:
    - cron: '0 8,18 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger FEMA disaster monitor
        run: |
          curl -sf -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://leads.faradaysun.com/api/cron/fema-monitor" \
            || echo "Request failed but continuing"
